<ion-content [fullscreen]="true" class="home-content">
  <div class="home-wrapper">

    <!-- Background orbs -->
    <div class="bg-orb bg-orb--top"></div>
    <div class="bg-orb bg-orb--bottom"></div>

    <!-- Header -->
    <div class="home-header">
      <div class="home-header__logo">
        <img src="assets/Smart Gym LOGO.png" alt="Smart Gym Logo" />
      </div>
      <div class="home-header__text">
        <p class="home-header__greeting">Bienvenido/a,</p>
        <h1 class="home-header__name">{{ usuario()?.nombre }} {{ usuario()?.apellido }}</h1>
        <span class="home-header__badge" [class.home-header__badge--admin]="esAdmin()">
          {{ esAdmin() ? 'Administrador' : 'Socio' }}
        </span>
      </div>
    </div>

    <!-- Divider -->
    <div class="home-divider"></div>

    <!-- Botón según rol -->
    <div class="home-action">

      <!-- SOCIO -->
      <button class="action-btn" *ngIf="!esAdmin()" (click)="reservarClase()">
        <div class="action-btn__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
          </svg>
        </div>
        <div class="action-btn__text">
          <span class="action-btn__label">Reservar Clase</span>
          <span class="action-btn__sub">Elegí tu turno y actividad</span>
        </div>
        <svg class="action-btn__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <!-- ADMIN -->
      <button class="action-btn" *ngIf="esAdmin()" (click)="gestionSocios()">
        <div class="action-btn__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="action-btn__text">
          <span class="action-btn__label">Gestión de Socios</span>
          <span class="action-btn__sub">Administrá los miembros del gym</span>
        </div>
        <svg class="action-btn__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

    </div>

    <!-- Logout -->
    <button class="btn-logout" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Cerrar sesión
    </button>

  </div>
</ion-content>
