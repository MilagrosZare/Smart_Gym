<ion-content [fullscreen]="true">

<div class="page" *ngIf="reserva">

<!-- Confirmación -->
<div class="success-header">

    <div class="check-circle">
    <ion-icon name="checkmark-outline"></ion-icon>
    </div>

    <h1 class="success-title">¡Reserva confirmada!</h1>

    <p class="success-sub">
    Tu lugar fue reservado correctamente.
    </p>

</div>

<!-- Ticket -->
<div class="detail-card">

    <div class="detail-card-header">
    <ion-icon name="ticket-outline"></ion-icon>
    <h2>Detalle de la reserva</h2>
    </div>

    <div class="detail-rows">

    <div class="detail-row">
        <span class="detail-label">Actividad</span>

        <span class="activity-badge">
        {{ reserva.actividad }}
        </span>
    </div>

    <div class="detail-row">
        <span class="detail-label">Fecha y hora</span>

        <span class="detail-value">
        {{ reserva.fechaHora }}
        </span>
    </div>

    <div class="detail-row">
        <span class="detail-label">Código</span>

        <span class="ticket-number">
        #{{ reserva.codigo }}
        </span>
    </div>

    </div>

</div>

<!-- Botones -->

<div class="actions">

    <ion-button
    fill="outline"
    color="medium"
    routerLink="/home-reservas">
    Volver a reservas
    </ion-button>

</div>

<!-- Cancelar -->

<div
    class="cancel-area"
    *ngIf="!cancelada">

    <button
    fill="clear"
    (click)="cancelarReserva()"
    class="cancel-reservation">

    <ion-icon
        slot="start"
        name="close-circle-outline">
    </ion-icon>

    Cancelar reserva

    </button>

</div>

<!-- Reserva cancelada -->

<div
    class="cancelled-notice"
    *ngIf="cancelada">
    <ion-icon name="alert-circle-outline"></ion-icon>
    La reserva fue cancelada correctamente.

</div>

</div>

</ion-content>
