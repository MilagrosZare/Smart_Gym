<ion-content [fullscreen]="true" class="login-content">
  <div class="login-wrapper">

    <!-- Elementos decorativos de fondo -->
    <div class="bg-orb bg-orb--top"></div>
    <div class="bg-orb bg-orb--bottom"></div>

    <!-- Logo y marca -->
    <div class="brand">
      <div class="brand__logo">
        <img src="assets/Smart Gym LOGO.png" alt="SmartGym Logo" class="img_logo">
      </div>
      <h1 class="brand__name">SMART GYM</h1>
      <p class="brand_tagline">UN GIMNASIO CREADO POR Y PARA MUJERES</p>
    </div>

    <!-- Card -->
    <div class="login-card">
      <h2 class="login-card__title">Iniciar sesión</h2>

      <!-- Email -->
      <div class="field" [class.field--error]="error() && !email">
        <label class="field__label" for="email">Usuario</label>
        <div class="field__input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
          <input
            id="email"
            class="field__input"
            type="email"
            [(ngModel)]="email"
            placeholder="Tu nombre de usuario"
            autocomplete="email"
            inputmode="email"
          />
        </div>
      </div>

      <!-- Contraseña -->
      <div class="field" [class.field--error]="error() && !password">
        <label class="field__label" for="password">Contraseña</label>
        <div class="field__input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
          </svg>
          <input
            id="password"
            class="field__input"
            [type]="showPassword() ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="field__eye"
            (click)="showPassword.set(!showPassword())"
          >
            <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6-pass">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
            <svg *ngIf = "showPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6-pass">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
</svg>

          </button>
        </div>
      </div>

      <!-- Mensaje de error -->
      <div class="error-msg" *ngIf="error()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ error() }}</span>
      </div>

      <!-- Botón submit -->
      <button
        class="btn-submit"
        [class.btn-submit--loading]="loading()"
        (click)="onSubmit()" 
        [disabled]="loading()"
      >
        <span class="btn-submit__text" *ngIf="!loading()">Entrar</span>
        <span class="btn-submit__spinner" *ngIf="loading()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
          Ingresando...
        </span>
      </button>

      <span class="login-card__forgot">
        <a (click)="recuperarContrasena()">¿Olvidaste tu contraseña?</a>
      </span>

    </div>
    <!-- Footer -->
    <p class="login-footer">© 2026 Smart Gym. Todos los derechos reservados.</p>
  </div>
</ion-content>
