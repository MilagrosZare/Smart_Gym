<div class="ion-page">
<ion-content [fullscreen]="true">
<div class="forgot-wrapper">

    <!-- Elementos decorativos de fondo -->
  <div class="bg-orb bg-orb--top"></div>
  <div class="bg-orb bg-orb--bottom"></div>

  <!-- ── PASO 1: Ingresar email ── -->
  <div class="forgot-container" *ngIf="!enviado()">

    <!-- Volver al login -->
    <button class="btn-back" (click)="volverAlLogin()">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
    </svg>
      Volver al inicio de sesión
    </button>

    <!-- Ícono -->
    <div class="forgot-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-shield-lock-fill" viewBox="0 0 16 16">
      <path fill-rule="evenodd" d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 63 63 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915l.385 1.99a.5.5 0 0 1-.491.595h-.788a.5.5 0 0 1-.49-.595l.384-1.99A1.5 1.5 0 0 1 8 5"/>
    </svg>
    </div>

    <!-- Título -->
    <div class="forgot-header">
      <h1 class="forgot-header__title">¿Olvidaste tu contraseña?</h1>
      <p class="forgot-header__subtitle">
        Ingresá tu correo electrónico y te enviaremos las instrucciones para recuperarla.
      </p>
    </div>

    <!-- Card -->
    <div class="forgot-card">

      <!-- Email -->
      <div class="field" [class.field--error]="error()">
        <label class="field__label" for="email">Correo electrónico</label>
        <div class="field__input-wrap">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            id="email"
            class="field__input"
            type="email"
            [(ngModel)]="email"
            placeholder="tucorreo@ejemplo.com"
            autocomplete="email"
            inputmode="email"
          />
        </div>
      </div>

      <!-- Error -->
      <div class="error-msg" *ngIf="error()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ error() }}</span>
      </div>

      <!-- Botón -->
      <button
        class="btn-submit"
        [class.btn-submit--loading]="loading()"
        (click)="enviarRecupero()"
        [disabled]="loading()"
      >
        <span class="btn-submit__text" *ngIf="!loading()">Enviar instrucciones</span>
        <span class="btn-submit__spinner" *ngIf="loading()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
          Enviando...
        </span>
      </button>

    </div>
  </div>

  <!-- ── PASO 2: Confirmación ── -->
  <div class="forgot-container forgot-container--confirm" *ngIf="enviado()">

    <!-- Ícono de éxito -->
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <div class="success-icon__check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
    </div>

    <!-- Mensaje -->
    <div class="forgot-header">
      <h1 class="forgot-header__title">¡Revisá tu correo!</h1>
      <p class="forgot-header__subtitle">
        Enviamos las instrucciones de recuperación a
      </p>
      <p class="confirm-email">{{ email }}</p>
      <p class="forgot-header__hint">
        Si no lo ves en unos minutos, revisá tu carpeta de spam.
      </p>
    </div>

    <!-- Volver -->
    <button class="btn-submit" (click)="volverAlLogin()">
      Volver al inicio de sesión
    </button>

    <!-- Reenviar -->
    <button class="btn-resend" (click)="reenviar()">
      ¿No recibiste el correo? Reenviar
    </button>

  </div>

</div>
</ion-content>
</div>
