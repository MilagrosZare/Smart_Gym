<ion-content [fullscreen]="true" class="registro-content">
  <div class="registro-wrapper">

    <!-- Fondo decorativo  -->
    <div class="bg-orb bg-orb--top"></div>
    <div class="bg-orb bg-orb--bottom"></div>

    <!-- Logo y marca -->
    <div class="brand">
      <div class="brand_logo">
        <img src="assets/Smart Gym LOGO.png" alt="SmartGym Logo">
      </div>
      <h1 class="brand__name">SMART GYM</h1>
      <p class="brand_tagline">UN GIMNASIO CREADO POR Y PARA MUJERES</p>
    </div>

    <!-- Card de registro -->
    <div class="registro-card">
      <h2 class="registro-card__title">Nuevo socio</h2>

      <!-- Nombre y Apellido  -->
      <div class="fields-row">

        <!-- Nombre -->
        <div class="field" [class.field--error]="error() && !nombre">
          <label class="field__label" for="nombre">Nombre</label>
          <div class="field__input-wrap">
            <!-- ícono de persona -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
            <input id="nombre" class="field__input" type="text" [(ngModel)]="nombre" placeholder="Tu nombre"
              autocomplete="given-name" />
          </div>
        </div>

        <!-- Apellido -->
        <div class="field" [class.field--error]="error() && !apellido">
          <label class="field__label" for="apellido">Apellido</label>
          <div class="field__input-wrap">
            <!-- ícono de persona -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
            <input id="apellido" class="field__input" type="text" [(ngModel)]="apellido" placeholder="Tu apellido"
              autocomplete="family-name" />
          </div>
        </div>

      </div>

      <!-- Teléfono -->
      <div class="field" [class.field--error]="error() && !telefono">
        <label class="field__label" for="telefono">Teléfono</label>
        <div class="field__input-wrap">
          <!-- ícono de teléfono -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" />
          </svg>
          <input id="telefono" class="field__input" type="tel" [(ngModel)]="telefono" placeholder="+54 9 11 0000-0000"
            autocomplete="tel" inputmode="tel" />
        </div>
      </div>

      <!-- Email  -->
      <div class="field" [class.field--error]="error() && !email">
        <label class="field__label" for="email">Correo electrónico</label>
        <div class="field__input-wrap">
          <!-- ícono de email  -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm0 0c0 1.657 1.007 3 2.25 3S21 13.657 21 12a9 9 0 1 0-2.636 6.364M16.5 12V8.25" />
          </svg>
          <input id="email" class="field__input" type="email" [(ngModel)]="email" placeholder="tucorreo@ejemplo.com"
            autocomplete="email" inputmode="email" />
        </div>
      </div>

      <!-- Contraseña -->
      <div class="field" [class.field--error]="error() && !password">
        <label class="field__label" for="password">Contraseña</label>
        <div class="field__input-wrap">
          <!-- ícono de candado  -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
          </svg>
          <input id="password" class="field__input" [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="password"
            placeholder="••••••••" autocomplete="new-password" />
          <!-- botón ojo  -->
          <button type="button" class="field__eye" (click)="showPassword.set(!showPassword())">
            <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.5" stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
            <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.5" stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Repetir contraseña -->
      <div class="field" [class.field--error]="error() && !confirmPassword">
        <label class="field__label" for="confirmPassword">Repetir contraseña</label>
        <div class="field__input-wrap">
          <!-- ícono de escudo -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
          </svg>
          <input id="confirmPassword" class="field__input" [type]="showConfirmPassword() ? 'text' : 'password'"
            [(ngModel)]="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
          <!-- botón ojo para la confirmación -->
          <button type="button" class="field__eye" (click)="showConfirmPassword.set(!showConfirmPassword())">
            <svg *ngIf="!showConfirmPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.5" stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
            <svg *ngIf="showConfirmPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.5" stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Mensaje de error  -->
      <div class="error-msg" *ngIf="error()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        <span>{{ error() }}</span>
      </div>

      <!-- Botón guardar -->
      <button class="btn-submit" [class.btn-submit--loading]="loading()" (click)="onSubmit()" [disabled]="loading()"
        id="btn-registro">
        <span class="btn-submit__text" *ngIf="!loading()">
          <!-- ícono de agregar persona -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM4 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 10.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
          </svg>
          Guardar datos
        </span>
        <span class="btn-submit__spinner" *ngIf="loading()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
          </svg>
          Registrando...
        </span>
      </button>

    </div>

    <!-- Footer -->
    <p class="registro-footer">© 2026 Smart Gym. Todos los derechos reservados.</p>
  </div>
</ion-content>
