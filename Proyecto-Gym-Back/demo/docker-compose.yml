services:
  api-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring_api_contenedor
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/api_gimnasio
      SPRING_DATASOURCE_USERNAME: luthier_dev
      SPRING_DATASOURCE_PASSWORD: devpassword
    depends_on:
      - mysqldb
    restart: always

  mysqldb:
    image: mysql:8.0
    container_name: mysql_api_contenedor
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: api_gimnasio
      MYSQL_USER: luthier_dev
      MYSQL_PASSWORD: devpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: adminer_api_contenedor
    restart: always
    ports:
      - "8085:8080"

volumes:
  mysql_data: